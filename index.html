<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geon_Space</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #1f2328;
    }

    header {
      display: flex;
      align-items: center;
      height: 64px;
      padding: 0 16px;
      border-bottom: 1px solid #d1d9e0;
    }

    .theme-switch {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #656d76;
      user-select: none;
    }

    .theme-toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .theme-toggle input { display: none; }

    .theme-toggle-track {
      position: absolute;
      inset: 0;
      background: #d1d9e0;
      border-radius: 11px;
      transition: background 0.2s;
    }

    .theme-toggle input:checked + .theme-toggle-track { background: #1f2328; }

    .theme-toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle input:checked ~ .theme-toggle-thumb { transform: translateX(18px); }

    /* Dark mode */
    body.dark {
      background: #0d1117;
      color: #e6edf3;
    }
    body.dark header { border-color: #30363d; background: #161b22; }
    body.dark .site-name { color: #e6edf3; }
    body.dark .site-desc { color: #8b949e; }
    body.dark .header-tab { color: #8b949e; }
    body.dark .header-tab:hover, body.dark .header-tab.active { background: #21262d; color: #e6edf3; }
    body.dark .clock { color: #e6edf3; }
    body.dark .calendar,
    body.dark .skills-box,
    body.dark .hacking-box,
    body.dark .youtube-box,
    body.dark .channels-box,
    body.dark .roulette-box,
    body.dark .playlist-box,
    body.dark .weather-box,
    body.dark .project-card { border-color: #30363d; }
    body.dark .calendar-header,
    body.dark .skills-header,
    body.dark .hacking-header,
    body.dark .youtube-header,
    body.dark .channels-header,
    body.dark .roulette-header,
    body.dark .playlist-header,
    body.dark .weather-header,
    body.dark .skills-add-section,
    body.dark .hacking-add-section,
    body.dark .roulette-add,
    body.dark .channels-add { border-color: #30363d; background: #161b22; }
    body.dark .calendar-nav button,
    body.dark .skills-add-btn,
    body.dark .hacking-add-btn,
    body.dark .roulette-add button,
    body.dark .channels-add button { color: #8b949e; }
    body.dark .calendar-grid .day { border-color: #21262d; color: #e6edf3; }
    body.dark .calendar-grid .day:hover { background: #21262d; }
    body.dark .calendar-grid .day-name { color: #8b949e; border-color: #30363d; }
    body.dark .skill-bar { background: #21262d; }
    body.dark .skills-search { background: #0d1117; border-color: #30363d; color: #e6edf3; }
    body.dark .skills-picker-item:hover { background: #21262d; }
    body.dark .yt-channel-name { color: #e6edf3; }
    body.dark .yt-subs { color: #e6edf3; }
    body.dark .yt-label, body.dark .yt-channel-name:hover { color: #58a6ff; }
    body.dark .channel-item { border-color: #21262d; }
    body.dark .roulette-result { color: #e6edf3; }
    body.dark .roulette-list-item { border-color: #21262d; color: #e6edf3; }
    body.dark .playlist-video-card { color: #e6edf3; border-color: #21262d; }
    body.dark .playlist-video-card:hover,
    body.dark .playlist-open-btn:hover { background: #21262d; }
    body.dark .hack-category { border-color: #21262d; }
    body.dark .hack-category-header:hover { background: #21262d; }
    body.dark .weather-current,
    body.dark .weather-graph,
    body.dark .weather-hours { border-color: #21262d; }
    body.dark .weather-day.today-day { background: #21262d; }
    body.dark .project-card:hover { border-color: #58a6ff; }
    body.dark .project-name { color: #58a6ff; }
    body.dark .theme-switch { color: #8b949e; }
    body.dark .projects-page { background: #0d1117; }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-tabs {
      display: flex;
      align-items: center;
      margin-left: 80px;
      gap: 4px;
      height: 100%;
    }

    .header-tab {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 500;
      color: #656d76;
      text-decoration: none;
      border-radius: 6px;
      cursor: pointer;
      height: 36px;
      transition: background 0.15s;
    }

    .header-tab:hover {
      background: #eaeef2;
      color: #1f2328;
    }

    .header-tab.active {
      color: #1f2328;
      font-weight: 600;
      background: #eaeef2;
    }

    .page { display: none; }
    .page.active { display: block; }

    .projects-page {
      padding: 24px 16px;
    }

    .projects-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .projects-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .project-card {
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      padding: 16px;
      transition: border-color 0.15s;
    }

    .project-card:hover {
      border-color: #0969da;
    }

    .project-name {
      font-size: 16px;
      font-weight: 600;
      color: #0969da;
      text-decoration: none;
    }

    .project-name:hover {
      text-decoration: underline;
    }

    .project-desc {
      font-size: 13px;
      color: #656d76;
      margin-top: 6px;
    }

    .project-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
      font-size: 12px;
      color: #656d76;
    }

    .project-lang-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .projects-loading {
      color: #656d76;
      font-size: 14px;
    }

    .site-desc {
      font-size: 10px;
      font-weight: 400;
      color: #656d76;
      letter-spacing: 0.5px;
    }

    .site-name {
      font-size: 28px;
      font-weight: 800;
      color: #000000;
      text-decoration: none;
    }

    .quote-box {
      margin: 20px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .quote-label {
      font-size: 11px;
      font-weight: 600;
      color: #656d76;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .quote-text {
      font-size: 15px;
      color: #1f2328;
      font-style: italic;
      line-height: 1.5;
    }

    .quote-author {
      font-size: 12px;
      color: #656d76;
      margin-top: 2px;
    }

    body.dark .quote-text { color: #e6edf3; }
    body.dark .quote-label, body.dark .quote-author { color: #8b949e; }

    .clock {
      margin: 8px 16px 0;
      font-size: 32px;
      font-weight: 600;
      color: #1f2328;
      font-variant-numeric: tabular-nums;
    }

    body.dark .clock { color: #e6edf3; }

    .calendar {
      margin: 24px 16px;
      width: 22%;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #d1d9e0;
    }

    .calendar-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .calendar-nav {
      display: flex;
      gap: 4px;
    }

    .calendar-nav button {
      background: #f6f8fa;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 14px;
      color: #1f2328;
    }

    .calendar-nav button:hover {
      background: #eaeef2;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .calendar-grid .day-name {
      font-size: 12px;
      font-weight: 600;
      color: #656d76;
      padding: 8px 0;
      border-bottom: 1px solid #d1d9e0;
    }

    .calendar-grid .day {
      padding: 0;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: default;
      border-bottom: 1px solid #f0f0f0;
    }

    .calendar-grid .day:hover {
      background: #f6f8fa;
    }

    .calendar-grid .day.empty {
      background: transparent;
    }

    .calendar-grid .day.today {
      color: #ffffff;
      font-weight: 600;
    }

    .widgets-row {
      display: flex;
      gap: 16px;
      margin: 24px 16px;
    }

    .widgets-row .calendar {
      margin: 0;
    }

    .youtube-box {
      width: 22%;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .youtube-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid #d1d9e0;
    }

    .youtube-channels {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .yt-channel {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .yt-channel-name {
      font-size: 13px;
      font-weight: 600;
      color: #1f2328;
      text-decoration: none;
    }

    .yt-channel-name:hover {
      color: #0969da;
    }

    .yt-subs {
      font-size: 20px;
      font-weight: 700;
      color: #1f2328;
    }

    .yt-label {
      font-size: 11px;
      color: #656d76;
    }

    .youtube-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .yt-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #d1d9e0;
      border-top: 2px solid #656d76;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .yt-spinner.active {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .skills-box {
      width: 22%;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .skills-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid #d1d9e0;
    }

    .skills-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .skill-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .skill-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .skill-name {
      font-size: 13px;
      font-weight: 600;
      color: #1f2328;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .skill-name i {
      font-size: 16px;
    }

    .skill-pct {
      font-size: 12px;
      color: #656d76;
      font-variant-numeric: tabular-nums;
    }

    .skill-bar {
      width: 100%;
      height: 8px;
      background: #eaeef2;
      border-radius: 4px;
      overflow: hidden;
    }

    .skill-bar-fill {
      height: 100%;
      background: #0969da;
      border-radius: 4px;
      transition: width 0.2s;
    }

    .skill-slider {
      width: 100%;
      margin: 0;
      cursor: pointer;
      accent-color: #0969da;
    }

    .skills-add-section {
      padding: 8px 16px;
      border-top: 1px solid #d1d9e0;
    }

    .skills-add-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #656d76;
      cursor: pointer;
      padding: 0;
    }

    .skills-add-btn:hover {
      color: #0969da;
    }

    .skills-picker {
      display: none;
      padding: 8px 16px 12px;
      border-top: 1px solid #d1d9e0;
    }

    .skills-picker.open {
      display: block;
    }

    .skills-search {
      width: 100%;
      padding: 6px 8px;
      font-size: 12px;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      outline: none;
      margin-bottom: 6px;
    }

    .skills-search:focus {
      border-color: #0969da;
    }

    .skills-picker-list {
      max-height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .hacking-box {
      width: 22%;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .hacking-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid #d1d9e0;
    }

    .hacking-list {
      display: flex;
      flex-direction: column;
    }

    .hack-category {
      border-bottom: 1px solid #f0f0f0;
    }

    .hack-category:last-child { border-bottom: none; }

    .hack-category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: #1f2328;
      user-select: none;
      transition: background 0.1s;
    }

    .hack-category-header:hover { background: #f6f8fa; }

    .hack-category-arrow {
      font-size: 10px;
      color: #656d76;
      transition: transform 0.2s;
    }

    .hack-category-arrow.open { transform: rotate(180deg); }

    .hack-category-body {
      display: none;
      padding: 8px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hack-category-body.collapsed { display: none; }

    .hacking-bar-fill {
      height: 100%;
      background: #cf222e;
      border-radius: 4px;
      transition: width 0.2s;
    }

    .hacking-add-section {
      padding: 8px 16px;
      border-top: 1px solid #d1d9e0;
    }

    .hacking-add-btn {
      background: none;
      border: none;
      font-size: 12px;
      color: #656d76;
      cursor: pointer;
      padding: 0;
    }

    .hacking-add-btn:hover { color: #cf222e; }

    .hacking-picker {
      display: none;
      padding: 8px 16px 12px;
      border-top: 1px solid #d1d9e0;
    }

    .hacking-picker.open { display: block; }

    .skills-picker-item {
      padding: 4px 6px;
      font-size: 12px;
      color: #1f2328;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .skills-picker-item i {
      font-size: 14px;
    }

    .skills-picker-item:hover {
      background: #f6f8fa;
    }

    .channels-box {
      width: 22%;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .channels-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid #d1d9e0;
    }

    .channels-list {
      padding: 8px 16px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .channel-item:last-child {
      border-bottom: none;
    }

    .channel-name {
      font-size: 13px;
      font-weight: 500;
      color: #1f2328;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 140px;
    }

    .channel-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .channel-go {
      font-size: 11px;
      color: #0969da;
      text-decoration: none;
      border: 1px solid #d1d9e0;
      border-radius: 4px;
      padding: 2px 8px;
    }

    .channel-go:hover {
      background: #f6f8fa;
    }

    .channel-del {
      background: none;
      border: none;
      color: #cf222e;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
    }

    .channel-del:hover {
      color: #a40e26;
    }

    .channels-add {
      padding: 8px 16px;
      border-top: 1px solid #d1d9e0;
    }

    .channels-add button {
      background: none;
      border: none;
      font-size: 12px;
      color: #656d76;
      cursor: pointer;
      padding: 0;
    }

    .channels-add button:hover {
      color: #0969da;
    }

    .channels-empty {
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: #656d76;
    }

    .roulette-box {
      width: 22%;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .roulette-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid #d1d9e0;
    }

    .roulette-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 16px;
    }

    .roulette-result {
      font-size: 20px;
      font-weight: 600;
      color: #1f2328;
      min-height: 30px;
    }

    .roulette-btn {
      background: #0969da;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .roulette-btn:hover {
      background: #0860ca;
    }

    .roulette-btn.spinning {
      opacity: 0.6;
      pointer-events: none;
    }

    .roulette-add {
      padding: 8px 16px;
      border-top: 1px solid #d1d9e0;
    }

    .roulette-add button {
      background: none;
      border: none;
      font-size: 12px;
      color: #656d76;
      cursor: pointer;
      padding: 0;
    }

    .roulette-add button:hover {
      color: #0969da;
    }

    .roulette-list {
      padding: 8px 16px;
      border-top: 1px solid #d1d9e0;
      display: none;
    }

    .roulette-list.open {
      display: block;
    }

    .roulette-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
      color: #1f2328;
    }

    .roulette-list-item .delete-btn {
      background: none;
      border: none;
      color: #cf222e;
      cursor: pointer;
      font-size: 12px;
      padding: 0 4px;
    }

    .roulette-list-item .delete-btn:hover {
      color: #a40e26;
    }

    .playlist-box {
      margin: 0 16px 24px;
      width: 360px;
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
    }

    .playlist-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid #d1d9e0;
      background: #f6f8fa;
    }

    .playlist-grid {
      display: flex;
      flex-direction: column;
      max-height: 400px;
      overflow-y: auto;
    }

    .playlist-video-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      text-decoration: none;
      color: #1f2328;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .playlist-video-card:last-child { border-bottom: none; }
    .playlist-video-card:hover { background: #f6f8fa; }

    .playlist-video-thumb {
      width: 96px;
      height: 54px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #e0e0e0;
    }

    .playlist-video-title {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .playlist-video-channel {
      font-size: 11px;
      color: #656d76;
      margin-top: 3px;
    }

    .playlist-loading {
      padding: 16px;
      font-size: 13px;
      color: #656d76;
    }

    .weather-box {
      border: 1px solid #d1d9e0;
      border-radius: 6px;
      overflow: hidden;
      width: 340px;
    }

    .weather-header {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid #d1d9e0;
      background: #f6f8fa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .weather-location {
      font-size: 12px;
      color: #656d76;
      font-weight: 400;
    }

    .weather-current {
      display: flex;
      align-items: center;
      padding: 16px;
      gap: 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    // Login ASCII Art
    (function initLoginArt() {
      const canvas = document.getElementById('login-art-canvas');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

      // Comet shape: blunt on right (+x = front facing mouse), tapered to point on left
      const raw = [
        "               ·          ",
        "            ·░▒           ",
        "         ·░▒▓██           ",
        "      ·░▒▓██████          ",
        "   ·░▒▓█████████          ",
        "·░▒▓████████████          ",
        "   ·░▒▓█████████          ",
        "      ·░▒▓██████          ",
        "         ·░▒▓██           ",
        "            ·░▒           ",
        "               ·          ",
      ];

      const colorMap = {
        '·': 'rgba(88,166,255,0.25)',
        '░': 'rgba(88,166,255,0.45)',
        '▒': 'rgba(130,195,255,0.65)',
        '▓': 'rgba(180,220,255,0.82)',
        '█': 'rgba(230,242,255,0.95)',
      };

      const fontSize = 13;
      const charW = fontSize * 0.62;
      const charH = fontSize * 1.2;
      const rows = raw.length;
      const midRow = Math.floor(rows / 2);

      // Find rightmost █ column as anchor (blunt face center)
      let maxCol = 0;
      raw.forEach(r => { maxCol = Math.max(maxCol, r.length); });

      const particles = [];
      raw.forEach((line, r) => {
        for (let c = 0; c < line.length; c++) {
          const ch = line[c];
          if (ch !== ' ') {
            particles.push({
              x: (c - maxCol + 2) * charW,
              y: (r - midRow) * charH,
              char: ch,
              color: colorMap[ch] || 'rgba(255,255,255,0.5)'
            });
          }
        }
      });

      let angle = 0;

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (document.getElementById('login-overlay').style.display === 'none') return;

        const cx = window.innerWidth / 2;
        const cy = window.innerHeight - 80;

        // 0° = 뾰족한 끝이 위, ±80° 제한
        const maxAngle = 80 * Math.PI / 180;
        const rawAngle = Math.atan2(mouseX - cx, cy - mouseY);
        const clamped = Math.max(-maxAngle, Math.min(maxAngle, rawAngle));
        const target = Math.PI / 2 + clamped;

        let diff = target - angle;
        while (diff > Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        angle += diff * 0.07;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.font = `${fontSize}px monospace`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';

        particles.forEach(p => {
          ctx.fillStyle = p.color;
          ctx.fillText(p.char, p.x, p.y);
        });

        ctx.restore();
        requestAnimationFrame(render);
      }

      render();
    })();

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date();

      const title = document.getElementById('calendar-title');
      title.textContent = `${year}년 ${month + 1}월`;

      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
      dayNames.forEach(name => {
        const el = document.createElement('div');
        el.className = 'day-name';
        el.textContent = name;
        grid.appendChild(el);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'day empty';
        grid.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'day';
        el.textContent = d;

        if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
          el.classList.add('today');
          const span = document.createElement('span');
          span.textContent = d;
          el.textContent = '';
          el.appendChild(span);
        }

        grid.appendChild(el);
      }
    }

    function fetchWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation_probability,wind_speed_10m,weather_code&hourly=temperature_2m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&forecast_days=7`;
      fetch(url).then(r => r.json()).then(data => {
        const cur = data.current;
        const [icon, desc] = weatherCodeMap[cur.weather_code] || ['🌡️','--'];
        const temp = Math.round(cur.temperature_2m);
        const hum = cur.relative_humidity_2m;
        const precip = cur.precipitation_probability;
        const wind = cur.wind_speed_10m;

        // Hourly: next 8 steps
        const nowHour = new Date().getHours();
        const allHourlyTemps = data.hourly.temperature_2m;
        const allHourlyTimes = data.hourly.time;
        const startIdx = allHourlyTimes.findIndex(t => new Date(t).getHours() === nowHour && t.startsWith(new Date().toISOString().slice(0,10)));
        const slice = startIdx >= 0 ? allHourlyTemps.slice(startIdx, startIdx + 8) : allHourlyTemps.slice(0, 8);
        const sliceTimes = startIdx >= 0 ? allHourlyTimes.slice(startIdx, startIdx + 8) : allHourlyTimes.slice(0, 8);

        // SVG graph
        const W = 308, H = 60, pad = 10;
        const minT = Math.min(...slice) - 1, maxT = Math.max(...slice) + 1;
        const pts = slice.map((t, i) => {
          const x = pad + (i / (slice.length - 1)) * (W - pad * 2);
          const y = H - pad - ((t - minT) / (maxT - minT)) * (H - pad * 2);
          return `${x},${y}`;
        });
        const polyline = pts.join(' ');
        const areaPath = `M${pts[0]} ${pts.slice(1).map(p => 'L'+p).join(' ')} L${pts[pts.length-1].split(',')[0]},${H} L${pts[0].split(',')[0]},${H} Z`;
        const tempLabels = slice.map((t, i) => {
          const x = pad + (i / (slice.length - 1)) * (W - pad * 2);
          const y = H - pad - ((t - minT) / (maxT - minT)) * (H - pad * 2) - 5;
          return `<text x="${x}" y="${y}" text-anchor="middle" font-size="9" fill="#656d76">${Math.round(t)}</text>`;
        }).join('');
        const hourLabels = sliceTimes.map((t, i) => {
          const x = pad + (i / (slice.length - 1)) * (W - pad * 2);
          const h = new Date(t).getHours();
          const label = h < 12 ? `AM ${h}시` : (h === 12 ? 'PM 12시' : `PM ${h-12}시`);
          return `<text x="${x}" y="10" text-anchor="middle" font-size="8" fill="#656d76">${label}</text>`;
        }).join('');

        // Daily
        const dailyHtml = data.daily.time.map((t, i) => {
          const d = new Date(t);
          const isToday = i === 0;
          const [dicon] = weatherCodeMap[data.daily.weather_code[i]] || ['🌡️'];
          const hi = Math.round(data.daily.temperature_2m_max[i]);
          const lo = Math.round(data.daily.temperature_2m_min[i]);
          return `<div class="weather-day${isToday ? ' today-day' : ''}">
            <div class="weather-day-name">${dayNames[d.getDay()]}</div>
            <div class="weather-day-icon">${dicon}</div>
            <div class="weather-day-temps">${hi}°<br><span style="color:#aaa">${lo}°</span></div>
          </div>`;
        }).join('');

        document.getElementById('weather-body').innerHTML = `
          <div class="weather-current">
            <div class="weather-icon">${icon}</div>
            <div>
              <div class="weather-temp">${temp}<span>°C</span></div>
              <div class="weather-desc">${desc}</div>
            </div>
            <div class="weather-stats">
              <div>강수확률: ${precip}%</div>
              <div>습도: ${hum}%</div>
              <div>풍속: ${wind}m/s</div>
            </div>
          </div>
          <div class="weather-graph">
            <svg viewBox="0 0 ${W} ${H}" height="${H}">
              <defs>
                <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#f0a500" stop-opacity="0.3"/>
                  <stop offset="100%" stop-color="#f0a500" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <path d="${areaPath}" fill="url(#wg)"/>
              <polyline points="${polyline}" fill="none" stroke="#f0a500" stroke-width="2" stroke-linejoin="round"/>
              ${tempLabels}
            </svg>
          </div>
          <div style="display:flex;justify-content:space-between;padding:0 ${pad}px 8px;font-size:10px;color:#656d76">
            ${sliceTimes.map((t, i) => {
              const h = new Date(t).getHours();
              const label = h < 12 ? `AM${h}` : (h===12?'PM12':`PM${h-12}`);
              const x = Math.round(pad + (i/(slice.length-1))*(W-pad*2));
              return `<span>${label}시</span>`;
            }).join('')}
          </div>
          <div class="weather-daily">${dailyHtml}</div>
        `;
      }).catch(() => {
        document.getElementById('weather-body').innerHTML = '<div style="padding:16px;font-size:13px;color:#656d76">날씨 불러오기 실패</div>';
      });
    }

      try {
        const handle = url.match(/@([^/?\s]+)/);
        if (handle) {
          const h = decodeURIComponent(handle[1]);
          const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet&forHandle=${h}&key=${YT_API_KEY}`);
          const data = await res.json();
          if (data.items && data.items.length > 0) {
            name = data.items[0].snippet.title;
          } else {
            name = h;
          }
        } else {
          name = url.replace(/https?:\/\/(www\.)?youtube\.com\//,'').replace(/\//g,'');
        }
      } catch(e) {
        const handle = url.match(/@([^/?\s]+)/);
        name = handle ? decodeURIComponent(handle[1]) : url;
      }
      if (!name) name = url;
      channels.push({ name, url: url.trim() });
      saveChannels();
      renderChannels();
    }

    function removeChannel(index) {
      channels.splice(index, 1);
      saveChannels();
      renderChannels();
    }

    renderChannels();

    const defaultItems = ['산책하기', '운동하기', '책 읽기', '영화 보기', '음악 듣기', '낮잠 자기', '요리하기', '청소하기', '게임하기', '그림 그리기'];
    const rouletteItems = JSON.parse(localStorage.getItem('rouletteItems')) || [...defaultItems];

    function saveRoulette() {
      localStorage.setItem('rouletteItems', JSON.stringify(rouletteItems));
    }

    function addRouletteItem() {
      const item = prompt('추가할 항목을 입력하세요:');
      if (item && item.trim()) {
        rouletteItems.push(item.trim());
        saveRoulette();
        renderList();
      }
    }

    function removeRouletteItem(index) {
      rouletteItems.splice(index, 1);
      saveRoulette();
      renderList();
    }

    function toggleList() {
      const list = document.getElementById('roulette-list');
      list.classList.toggle('open');
      if (list.classList.contains('open')) renderList();
    }

    function renderList() {
      const list = document.getElementById('roulette-list');
      list.innerHTML = '';
      rouletteItems.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'roulette-list-item';
        row.innerHTML = `<span>${item}</span><button class="delete-btn" onclick="removeRouletteItem(${i})">삭제</button>`;
        list.appendChild(row);
      });
    }

    function spinRoulette() {
      const btn = document.getElementById('roulette-btn');
      const result = document.getElementById('roulette-result');
      btn.classList.add('spinning');

      let count = 0;
      const interval = setInterval(() => {
        result.textContent = rouletteItems[Math.floor(Math.random() * rouletteItems.length)];
        count++;
        if (count > 15) {
          clearInterval(interval);
          btn.classList.remove('spinning');
        }
      }, 100);
    }

    // Playlists
    const PLAYLIST_ID_TARGET = '좋아하는 음매드';
    const apiKey = 'AIzaSyAClL4yizMIUwG_eJb9u6ySNXygOLZL5eQ';

    function fetchPlaylists() {
      const channelId = 'UCr9vDiU1oUOTueD-vXC5Hog';
      fetch(`https://www.googleapis.com/youtube/v3/playlists?part=snippet,contentDetails&channelId=${channelId}&maxResults=50&key=${apiKey}`)
        .then(r => r.json())
        .then(data => {
          const el = document.getElementById('playlist-list');
          if (!data.items || !data.items.length) {
            el.innerHTML = '<div class="playlist-loading">공개된 플레이리스트가 없습니다.</div>';
            return;
          }
          const target = data.items.find(item => item.snippet.title === PLAYLIST_ID_TARGET);
          if (!target) {
            el.innerHTML = '<div class="playlist-loading">플레이리스트를 찾을 수 없습니다.</div>';
            return;
          }
          fetchPlaylistItems(target.id);
        })
        .catch(() => {
          document.getElementById('playlist-list').innerHTML = '<div class="playlist-loading">불러오기 실패</div>';
        });
    }

    function fetchPlaylistItems(listId) {
      fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${listId}&maxResults=50&key=${apiKey}`)
        .then(r => r.json())
        .then(data => {
          const el = document.getElementById('playlist-list');
          if (!data.items || !data.items.length) {
            el.innerHTML = '<div class="playlist-loading">영상이 없습니다.</div>';
            return;
          }
          el.innerHTML = data.items.map(item => {
            const title = item.snippet.title;
            const channel = item.snippet.videoOwnerChannelTitle || '';
            const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '';
            const videoId = item.snippet.resourceId.videoId;
            const url = `https://www.youtube.com/watch?v=${videoId}&list=${listId}`;
            return `<a class="playlist-video-card" href="${url}" target="_blank">
              <img class="playlist-video-thumb" src="${thumb}" alt="">
              <div>
                <div class="playlist-video-title">${title}</div>
                <div class="playlist-video-channel">${channel}</div>
              </div>
            </a>`;
          }).join('');
        })
        .catch(() => {
          document.getElementById('playlist-list').innerHTML = '<div class="playlist-loading">불러오기 실패</div>';
        });
    }

    fetchPlaylists();

    // Tab switching
    const langColors = {HTML:'#e34c26',CSS:'#563d7c',JavaScript:'#f1e05a',TypeScript:'#3178c6',Python:'#3572A5',Java:'#b07219','C++':'#f34b7d',C:'#555555','C#':'#178600',Go:'#00ADD8',Rust:'#dea584',Swift:'#F05138',Kotlin:'#A97BFF',Ruby:'#701516',PHP:'#4F5D95',Dart:'#00B4AB',Shell:'#89e051',Lua:'#000080',Vue:'#41b883',SCSS:'#c6538c'};

    function switchTab(tab) {
      document.querySelectorAll('.header-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      if (tab === 'home') {
        document.querySelector('.header-tab:nth-child(1)').classList.add('active');
        document.getElementById('page-home').classList.add('active');
      } else if (tab === 'projects') {
        document.querySelector('.header-tab:nth-child(2)').classList.add('active');
        document.getElementById('page-projects').classList.add('active');
        fetchRepos();
      }
    }

    let reposLoaded = false;
    function fetchRepos() {
      if (reposLoaded) return;
      fetch('https://api.github.com/users/geonhee15/repos?sort=updated&per_page=100')
        .then(r => r.json())
        .then(repos => {
          reposLoaded = true;
          const list = document.getElementById('projects-list');
          if (!repos.length) { list.innerHTML = '<div class="projects-loading">레포지토리가 없습니다.</div>'; return; }
          list.innerHTML = repos.map(repo => {
            const lang = repo.language || '';
            const dot = lang ? `<span class="project-lang-dot" style="background:${langColors[lang]||'#8b949e'}"></span>${lang}` : '';
            const stars = repo.stargazers_count ? `⭐ ${repo.stargazers_count}` : '';
            const desc = repo.description ? `<div class="project-desc">${repo.description}</div>` : '';
            const vis = repo.private ? '🔒 Private' : '';
            return `<div class="project-card">
              <a class="project-name" href="${repo.html_url}" target="_blank">${repo.name}</a> <span style="font-size:12px;color:#656d76">${vis}</span>
              ${desc}
              <div class="project-meta">
                <span>${dot}</span>
                <span>${stars}</span>
                <span>Updated ${new Date(repo.updated_at).toLocaleDateString('ko-KR')}</span>
              </div>
            </div>`;
          }).join('');
        })
        .catch(() => {
          document.getElementById('projects-list').innerHTML = '<div class="projects-loading">불러오기 실패</div>';
        });
    }
  </script>
</body>
</html>
